#!/usr/bin/env bash

# ASRL tool and dependency registry.
#
# Fields: id|label|required|check type|check target|min version|install methods
# Check types: command, java-major, package
# Install methods: apt:<package>, manual:<URL or instructions>
#
# Doctor evaluates this registry. Bootstrap uses the same evaluation result and
# automatically applies only apt methods. Manual methods are shown in its plan.
TOOL_SPECS=(
    "git|Git|required|command|git||apt:git-core"
    "gnupg|GnuPG|required|command|gpg||apt:gnupg"
    "flex|flex|required|command|flex||apt:flex"
    "bison|bison|required|command|bison||apt:bison"
    "build-essential|Build essentials|required|package|build-essential||apt:build-essential"
    "zip|zip|required|command|zip||apt:zip"
    "curl|curl|required|command|curl||apt:curl"
    "zlib1g-dev|zlib development|required|package|zlib1g-dev||apt:zlib1g-dev"
    "libc6-dev-i386|32-bit libc development|required|package|libc6-dev-i386||apt:libc6-dev-i386"
    "x11proto-core-dev|X11 protocol headers|required|package|x11proto-core-dev||apt:x11proto-core-dev"
    "libx11-dev|X11 development|required|package|libx11-dev||apt:libx11-dev"
    "lib32z1-dev|32-bit zlib development|required|package|lib32z1-dev||apt:lib32z1-dev"
    "libgl1-mesa-dev|Mesa GL development|required|package|libgl1-mesa-dev||apt:libgl1-mesa-dev"
    "libxml2-utils|XML utilities|required|package|libxml2-utils||apt:libxml2-utils"
    "xsltproc|XSLT processor|required|command|xsltproc||apt:xsltproc"
    "unzip|unzip|required|command|unzip||apt:unzip"
    "fontconfig|fontconfig|required|command|fc-list||apt:fontconfig"
    "python3|Python 3|required|command|python3||apt:python3"
    "java|Java|required|java-major|java|17|apt:openjdk-17-jdk"
    "repo|Repo|recommended|command|repo||apt:repo,manual:https://gerrit.googlesource.com/git-repo"
    "ccache|ccache|recommended|command|ccache||apt:ccache"
    "adb|ADB|recommended|command|adb||apt:adb"
    "emulator|Android Emulator|recommended|command|emulator||manual:https://developer.android.com/studio/run/emulator-commandline"
)
