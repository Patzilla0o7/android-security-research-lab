#!/usr/bin/env bash

# Ubuntu 24.04 packages required for AOSP development.
#
# The base list follows the Android Open Source Project setup guidance for
# Ubuntu 18.04 and later. OpenJDK 17, repo, and ccache are added because ASRL
# validates and uses them directly.
BOOTSTRAP_APT_PACKAGES=(
    git-core
    gnupg
    flex
    bison
    build-essential
    zip
    curl
    zlib1g-dev
    libc6-dev-i386
    x11proto-core-dev
    libx11-dev
    lib32z1-dev
    libgl1-mesa-dev
    libxml2-utils
    xsltproc
    unzip
    fontconfig
    openjdk-17-jdk
    repo
    ccache
)
